<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tent Simulator</title>

<style>
body{
font-family:sans-serif;
text-align:center;
}

canvas{
border:1px solid #aaa;
max-width:95%;
touch-action:none;
}

button{
margin:5px;
padding:8px 12px;
}
</style>
</head>

<body>

<h2>テント張替えシミュレーター(test)</h2>

<input type="file" id="upload"><br><br>

<select id="fabricSelect">
<option>生地読み込み中...</option>
</select>

<br><br>

<button onclick="undoPoint()">1点戻す</button>
<button onclick="clearPolygon()">囲い削除</button>
<button onclick="finishPolygon()">囲み完了</button>
<button onclick="saveImage()">画像保存</button>

<br><br>

<canvas id="canvas"></canvas>

<div id="saveArea"></div>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQyMy5PUSJjr1f_fnQIpRIUagAp8Dw7Hqckr9422w_459qgQ_j4Bhw4LWygLVWTURa9n4Xl_gBNHAie/pub?output=csv"

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let originalImage=null
let points=[]
let maskPath=null
let draggingPoint=-1

let scale=1
let offsetX=0
let offsetY=0

let pointers=[]
let lastDistance=0
let lastPanX=0
let lastPanY=0

fetch(csvURL)
.then(res=>res.text())
.then(text=>{

const rows=text.trim().split("\n").slice(1)
const select=document.getElementById("fabricSelect")

select.innerHTML=""

rows.forEach(row=>{

if(!row.trim())return

const cols=row.split(",")

const name=cols[0]
const r=cols[1]
const g=cols[2]
const b=cols[3]

const option=document.createElement("option")

option.textContent=name
option.value=`${r},${g},${b}`

select.appendChild(option)

})

})

document.getElementById("upload").onchange=e=>{

const file=e.target.files[0]
const img=new Image()

img.onload=()=>{

canvas.width=img.width
canvas.height=img.height

scale=1
offsetX=0
offsetY=0

originalImage=img
points=[]
maskPath=null

draw()

}

img.src=URL.createObjectURL(file)

}

function getMousePos(e){

const rect=canvas.getBoundingClientRect()

const x=(e.clientX-rect.left)*(canvas.width/rect.width)
const y=(e.clientY-rect.top)*(canvas.height/rect.height)

return{
x:(x-offsetX)/scale,
y:(y-offsetY)/scale
}

}

function findPoint(pos){

for(let i=0;i<points.length;i++){

const dx=points[i].x-pos.x
const dy=points[i].y-pos.y

if(Math.sqrt(dx*dx+dy*dy)<20){
return i
}

}

return -1

}

canvas.addEventListener("pointerdown",e=>{

canvas.setPointerCapture(e.pointerId)

pointers.push(e)

lastPanX=e.clientX
lastPanY=e.clientY

const pos=getMousePos(e)
const hit=findPoint(pos)

if(hit>=0 && pointers.length===1){
draggingPoint=hit
}

})

canvas.addEventListener("pointermove",e=>{

for(let i=0;i<pointers.length;i++){
if(pointers[i].pointerId===e.pointerId){
pointers[i]=e
}
}

if(pointers.length===2){

const p1=pointers[0]
const p2=pointers[1]

const dx=p1.clientX-p2.clientX
const dy=p1.clientY-p2.clientY

const distance=Math.sqrt(dx*dx+dy*dy)

const centerX=(p1.clientX+p2.clientX)/2
const centerY=(p1.clientY+p2.clientY)/2

const rect=canvas.getBoundingClientRect()

const mouseX=(centerX-rect.left)*(canvas.width/rect.width)
const mouseY=(centerY-rect.top)*(canvas.height/rect.height)

if(lastDistance){

const zoom=distance/lastDistance

offsetX=mouseX-(mouseX-offsetX)*zoom
offsetY=mouseY-(mouseY-offsetY)*zoom

scale*=zoom

draw()

}

lastDistance=distance
return

}

if(pointers.length===1 && draggingPoint===-1){

offsetX+=e.clientX-lastPanX
offsetY+=e.clientY-lastPanY

lastPanX=e.clientX
lastPanY=e.clientY

draw()
return

}

if(draggingPoint>=0){

const pos=getMousePos(e)
points[draggingPoint]=pos
draw()

}

})

canvas.addEventListener("pointerup",e=>{

pointers=pointers.filter(p=>p.pointerId!==e.pointerId)
lastDistance=0
draggingPoint=-1

})

canvas.addEventListener("wheel",e=>{

e.preventDefault()

const rect=canvas.getBoundingClientRect()

const mouseX=(e.clientX-rect.left)*(canvas.width/rect.width)
const mouseY=(e.clientY-rect.top)*(canvas.height/rect.height)

const zoom=e.deltaY<0?1.1:0.9

offsetX=mouseX-(mouseX-offsetX)*zoom
offsetY=mouseY-(mouseY-offsetY)*zoom

scale*=zoom

draw()

})

function draw(){

ctx.setTransform(1,0,0,1,0,0)
ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.setTransform(scale,0,0,scale,offsetX,offsetY)

if(originalImage){
ctx.drawImage(originalImage,0,0)
}

if(maskPath){
applyFabric()
return
}

if(points.length===0)return

ctx.beginPath()
ctx.moveTo(points[0].x,points[0].y)

for(let i=1;i<points.length;i++){
ctx.lineTo(points[i].x,points[i].y)
}

ctx.strokeStyle="red"
ctx.lineWidth=3
ctx.stroke()

for(let p of points){

ctx.beginPath()
ctx.arc(p.x,p.y,6,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

}

function finishPolygon(){

if(points.length<3)return

maskPath=new Path2D()

maskPath.moveTo(points[0].x,points[0].y)

for(let i=1;i<points.length;i++){
maskPath.lineTo(points[i].x,points[i].y)
}

maskPath.closePath()

draw()

}

document.getElementById("fabricSelect").onchange=draw

function applyFabric(){

if(!maskPath)return

const val=document.getElementById("fabricSelect").value
const cols=val.split(",")

ctx.save()

ctx.clip(maskPath)

ctx.globalCompositeOperation="multiply"

ctx.fillStyle=`rgb(${cols[0]},${cols[1]},${cols[2]})`

ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.restore()

}

function undoPoint(){

points.pop()
draw()

}

function clearPolygon(){

points=[]
maskPath=null
draw()

}


/* ===== 保存機能 ===== */

function saveImage(){

if(!originalImage)return

const exportCanvas=document.createElement("canvas")
const exportCtx=exportCanvas.getContext("2d")

exportCanvas.width=canvas.width
exportCanvas.height=canvas.height

exportCtx.drawImage(originalImage,0,0)

if(maskPath){

const val=document.getElementById("fabricSelect").value
const cols=val.split(",")

exportCtx.save()

exportCtx.beginPath()
exportCtx.moveTo(points[0].x,points[0].y)

for(let i=1;i<points.length;i++){
exportCtx.lineTo(points[i].x,points[i].y)
}

exportCtx.closePath()
exportCtx.clip()

exportCtx.globalCompositeOperation="multiply"

exportCtx.fillStyle=`rgb(${cols[0]},${cols[1]},${cols[2]})`

exportCtx.fillRect(0,0,exportCanvas.width,exportCanvas.height)

exportCtx.restore()

}

const imgURL=exportCanvas.toDataURL("image/png")

const isMobile=/iPhone|Android/i.test(navigator.userAgent)

if(isMobile){

const area=document.getElementById("saveArea")

area.innerHTML=""

const img=document.createElement("img")
img.src=imgURL
img.style.width="95%"
img.style.marginTop="20px"

area.appendChild(img)

alert("画像を長押しして保存してください")

}else{

const link=document.createElement("a")
link.download="tent_simulation.png"
link.href=imgURL
link.click()

}

}

</script>

</body>
</html>
